<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Console | CloudLearn{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* Reset and Base Styles */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* CSS Custom Properties for Theme */
  :root {
    /* Base Colors */
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-tertiary: #1a1a24;
    --bg-glass: rgba(26, 26, 36, 0.85);
    --bg-glass-hover: rgba(26, 26, 36, 0.95);
    
    /* Accent Colors */
    --accent-electric: #00d4ff;
    --accent-purple: #a855f7;
    --accent-purple-bright: #c084fc;
    --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #a855f7 100%);
    --accent-gradient-hover: linear-gradient(135deg, #38bdf8 0%, #c084fc 100%);
    
    /* Text Colors */
    --text-primary: #ffffff;
    --text-secondary: #e2e8f0;
    --text-muted: #94a3b8;
    --text-accent: #00d4ff;
    
    /* Borders and Shadows */
    --border-primary: rgba(255, 255, 255, 0.1);
    --border-secondary: rgba(255, 255, 255, 0.05);
    --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
    --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.1);
    --shadow-purple-glow: 0 0 20px rgba(168, 85, 247, 0.1);
    
    /* Status Colors */
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    
    /* Layout */
    --sidebar-width: 280px;
    --border-radius: 16px;
    --border-radius-sm: 12px;
    --spacing-xs: 8px;
    --spacing-sm: 12px;
    --spacing-md: 16px;
    --spacing-lg: 24px;
    --spacing-xl: 32px;
    --spacing-2xl: 48px;
  }

  /* Global Styles */
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated Background */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 40% 40%, rgba(192, 132, 252, 0.05) 0%, transparent 50%);
    animation: backgroundFloat 20s ease-in-out infinite;
    z-index: -1;
  }

  @keyframes backgroundFloat {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33% { transform: translateY(-10px) rotate(1deg); }
    66% { transform: translateY(10px) rotate(-1deg); }
  }

  /* Typography */
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text-primary);
  }

  h1 { font-size: 2.5rem; font-weight: 700; }
  h2 { font-size: 2rem; font-weight: 600; }
  h3 { font-size: 1.5rem; font-weight: 600; }
  h4 { font-size: 1.25rem; font-weight: 500; }

  p { line-height: 1.6; color: var(--text-secondary); }

  /* Glassmorphism Utility */
  .glass {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-primary);
    box-shadow: var(--shadow-soft);
  }

  .glass-hover {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .glass-hover:hover {
    background: var(--bg-glass-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-soft), var(--shadow-glow);
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border-primary);
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-shadow: var(--shadow-soft);
  }

  .sidebar-logo {
    padding: var(--spacing-xl);
    font-weight: 700;
    font-size: 1.25rem;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    border-bottom: 1px solid var(--border-primary);
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    position: relative;
  }

  .sidebar-logo::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--accent-gradient);
    border-radius: 1px;
  }

  .sidebar-nav {
    padding: var(--spacing-lg) var(--spacing-md);
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
    padding: var(--spacing-md) var(--spacing-lg);
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    border-radius: var(--border-radius-sm);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }

  .nav-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 0;
    height: 100%;
    background: var(--accent-gradient);
    transition: width 0.3s ease;
    z-index: -1;
  }

  .nav-item:hover::before {
    width: 100%;
  }

  .nav-item:hover {
    color: var(--text-primary);
    transform: translateX(4px);
  }

  .nav-item.active {
    background: var(--accent-gradient);
    color: var(--text-primary);
    box-shadow: var(--shadow-glow);
  }

  .nav-item.active::before {
    width: 100%;
  }

  .sidebar-footer {
    padding: var(--spacing-lg);
    border-top: 1px solid var(--border-primary);
  }

  .logout-btn {
    color: var(--danger);
    text-decoration: none;
    font-size: 0.8125rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    padding: var(--spacing-sm) var(--spacing-md);
    border-radius: var(--border-radius-sm);
    transition: all 0.3s ease;
  }

  .logout-btn:hover {
    background: rgba(239, 68, 68, 0.1);
    transform: translateX(4px);
  }

  /* Main Content */
  .main {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 0;
    min-width: 0;
  }

  /* Top Bar */
  .top-bar {
    height: 80px;
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--spacing-2xl);
    position: sticky;
    top: 0;
    z-index: 90;
    box-shadow: var(--shadow-soft);
  }

  .breadcrumbs {
    font-size: 0.8125rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .breadcrumbs span {
    color: var(--text-primary);
    font-weight: 600;
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: var(--spacing-xl);
  }

  .region-tag {
    font-size: 0.6875rem;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.1) 100%);
    color: var(--success);
    padding: 6px var(--spacing-md);
    border-radius: var(--border-radius-sm);
    font-weight: 600;
    border: 1px solid rgba(16, 185, 129, 0.2);
    backdrop-filter: blur(10px);
  }

  .user-info {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
  }

  .user-info::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
  }

  .content {
    padding: var(--spacing-2xl);
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  /* Cards */
  .card {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-primary);
    border-radius: var(--border-radius);
    padding: var(--spacing-xl);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-soft);
    margin-bottom: var(--spacing-xl);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent-gradient);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .card:hover::before {
    opacity: 1;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-soft), var(--shadow-glow);
    border-color: var(--border-secondary);
  }

  .section-head {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: var(--spacing-xl);
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
    font-family: 'Poppins', sans-serif;
  }

  .section-head::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--accent-electric), var(--accent-purple), transparent);
    opacity: 0.5;
  }

  /* Badges */
  .badge {
    padding: 4px var(--spacing-sm);
    border-radius: var(--border-radius-sm);
    font-size: 0.6875rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    backdrop-filter: blur(10px);
  }

  .badge-blue {
    background: rgba(0, 212, 255, 0.1);
    color: var(--accent-electric);
    border: 1px solid rgba(0, 212, 255, 0.2);
  }

  .badge-purple {
    background: rgba(168, 85, 247, 0.1);
    color: var(--accent-purple);
    border: 1px solid rgba(168, 85, 247, 0.2);
  }

  .badge-success {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .badge-warn {
    background: rgba(245, 158, 11, 0.1);
    color: var(--warning);
    border: 1px solid rgba(245, 158, 11, 0.2);
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-md) var(--spacing-xl);
    border-radius: var(--border-radius-sm);
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    border: 1px solid rgba(0, 212, 255, 0.2);
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    transition: left 0.5s ease;
  }

  .btn:hover::before {
    left: 100%;
  }

  .btn-primary {
    background: var(--accent-gradient);
    color: white;
    border: 1px solid rgba(0, 212, 255, 0.3);
    box-shadow: var(--shadow-glow);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    border-color: rgba(0, 212, 255, 0.5);
    box-shadow: var(--shadow-glow), 0 10px 25px rgba(0, 212, 255, 0.2);
  }

  .btn-secondary {
    background: var(--bg-glass);
    color: var(--text-primary);
    border: 1px solid var(--border-primary);
    backdrop-filter: blur(10px);
  }

  .btn-secondary:hover {
    background: var(--bg-glass-hover);
    border-color: var(--accent-electric);
  }

  /* Pills */
  .pill {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 1px solid;
  }

  .pill-beginner {
    background: rgba(16, 185, 129, 0.12);
    color: var(--success);
    border-color: rgba(16, 185, 129, 0.3);
  }

  .pill-intermediate {
    background: rgba(251, 191, 36, 0.12);
    color: var(--warning);
    border-color: rgba(251, 191, 36, 0.3);
  }

  .pill-advanced {
    background: rgba(59, 130, 246, 0.12);
    color: var(--accent-electric);
    border-color: rgba(59, 130, 246, 0.3);
  }

  .pill-admin {
    background: rgba(248, 113, 113, 0.12);
    color: var(--danger);
    border-color: rgba(248, 113, 113, 0.3);
  }

  .pill-user {
    background: rgba(100, 116, 139, 0.12);
    color: var(--text-muted);
    border-color: rgba(100, 116, 139, 0.3);
  }

  /* Form Elements */
  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="number"],
  input[type="date"],
  select,
  textarea {
    background: var(--bg-glass);
    border: 1px solid var(--border-primary);
    color: var(--text-primary);
    padding: var(--spacing-sm) var(--spacing-md);
    border-radius: var(--border-radius-sm);
    font-size: 0.875rem;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="password"]:focus,
  input[type="number"]:focus,
  input[type="date"]:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--accent-electric);
    box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    background: var(--bg-glass-hover);
  }

  input[type="submit"],
  input[type="button"] {
    border: 1px solid rgba(0, 212, 255, 0.2);
    background: var(--accent-gradient);
    color: white;
    padding: var(--spacing-sm) var(--spacing-xl);
    border-radius: var(--border-radius-sm);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  input[type="submit"]:hover,
  input[type="button"]:hover {
    border-color: rgba(0, 212, 255, 0.4);
    transform: translateY(-2px);
    box-shadow: var(--shadow-glow);
  }

  /* Grid Layouts */
  .flex-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .flex-center {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--spacing-xl);
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--spacing-xl);
  }

  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--spacing-xl);
  }

  /* Responsive Design */
  @media (max-width: 1200px) {
    .grid-4 { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 900px) {
    .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .top-bar { padding: 0 var(--spacing-lg); }
    .content { padding: var(--spacing-lg); }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  /* Scrollbar Styling */
  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: var(--bg-secondary);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--bg-tertiary);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent-electric);
  }

  /* Animations */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in-up {
    animation: fadeInUp 0.6s ease-out;
  }

  /* Loading States */
  .loading {
    position: relative;
    overflow: hidden;
  }

  .loading::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
    animation: loading 1.5s infinite;
  }

  @keyframes loading {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  {% block extra_css %}{% endblock %}
</style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00d4ff"/>
            <stop offset="100%" style="stop-color:#a855f7"/>

      </svg>
      CloudLearn
    </div>
    <nav class="sidebar-nav">

          <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>

        </svg>
        Dashboard
      </a>
      <a href="/learn" class="nav-item {% if request.path == '/learn' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 14L21 9L12 4L3 9L12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        Learning Engine

          <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
          <line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="2"/>
        </svg>
        Billing & Cost
      </a>
      <a href="/leaderboard" class="nav-item {% if request.path == '/leaderboard' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 8L18 10L22 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 12L8 14L12 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 16L4 18L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Leaderboard

      <a href="/profile" class="nav-item {% if request.path == '/profile' %}active{% endif %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Profile Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/logout" class="logout-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Log out
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <header class="top-bar">
      <div class="breadcrumbs">Console / <span>{% block page_name %}Dashboard{% endblock %}</span></div>
      <div class="top-right">
        <span class="region-tag">ap-south-1 (Mumbai)</span>
        <div class="user-info">{{ username if username else 'User' }}</div>
      </div>
    </header>

    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
